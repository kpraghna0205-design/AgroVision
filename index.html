<!DOCTYPE html>
<html lang="en">
<head>
    <title>AgroVision Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f1f8e9; margin: 0; padding: 20px; text-align: center; }
        .card { background: white; max-width: 500px; margin: 40px auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid #2e7d32; }
        h1 { color: #2e7d32; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1b5e20; }
        .logout-btn { float: right; color: #d32f2f; text-decoration: none; font-weight: bold; padding: 10px; }
        .upload-section { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed #2e7d32; }
    </style>
</head>
<body>

    <div class="card">
        <a href="/logout" class="logout-btn">Logout</a>
        <h1>🌱 AgroVision</h1>
        <p>AI Crop Prediction & Disease Analysis</p>

        <!-- The 'enctype' is CRITICAL for uploading images -->
        <form action="/predict" method="POST" enctype="multipart/form-data">
            
            <label>Select Crop Type:</label>
            <select name="crop">
                <option value="Rice">Rice</option>
                <option value="Wheat">Wheat</option>
                <option value="Maize">Maize</option>
                <option value="Cotton">Cotton</option>
                <option value="Sugarcane">Sugarcane</option>
                <option value="Potato">Potato</option>
            </select>

            <input type="number" name="temp" placeholder="Temperature (°C)" required>
            <input type="number" name="rain" placeholder="Rainfall (mm)" required>
            <input type="number" name="fert" placeholder="Fertilizer (kg/acre)" required>
            <input type="number" name="hum" placeholder="Humidity (%)" required>
            
            <div class="upload-section">
                <p><b>📸 Camera: Upload leaf photo</b></p>
                <input type="file" name="leaf_image" accept="image/*">
            </div>
            
            <br>
            <button type="submit">GENERATE ANALYSIS REPORT</button>
        </form>
    </div>

</body>
</html>
